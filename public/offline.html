<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline — TektonX</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .card {
        text-align: center;
        max-width: 420px;
        padding: 2.5rem;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 1rem;
        background: rgba(255,255,255,0.03);
      }
      .brand {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: 0.05em;
        background: linear-gradient(135deg, #7C3AED, #14B8A6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1.5rem;
      }
      h1 { font-size: 1.25rem; margin-bottom: 0.75rem; }
      p { color: rgba(255,255,255,0.5); font-size: 0.875rem; line-height: 1.6; }
      button {
        margin-top: 1.5rem;
        padding: 0.625rem 1.5rem;
        background: #7C3AED;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #6d28d9; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">TektonX</div>
      <h1>You're offline</h1>
      <p>Some features require an internet connection. Cached content is still available — try navigating to a page you've visited before.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
